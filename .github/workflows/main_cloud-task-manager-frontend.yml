name: Build and deploy Node.js app to Azure Web App - cloud-task-manager-frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          npm install
          npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: "https://TWOJ_BACKEND.azurewebsites.net/api"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: dist

      - name: Azure login
        uses: azure/login@v2
        with:
          auth-type: OIDC
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: cloud-task-manager-frontend
          package: dist
