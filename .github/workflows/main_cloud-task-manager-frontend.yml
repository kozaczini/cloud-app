deploy:
  runs-on: ubuntu-latest
  needs: build

  steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: node-app
        path: dist

    - name: Azure CLI login (service principal)
      uses: azure/CLI@v2
      with:
        inlineScript: |
          az login --service-principal \
            --username ${{ secrets.AZUREAPPSERVICE_CLIENTID_5537F7C7E46E4FC58D4033A57A6693CF }} \
            --password ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6C8409BC515044B3B5B4CCE924D40EBC }} \
            --tenant ${{ secrets.AZUREAPPSERVICE_TENANTID_D042E4AE0B41497FB19FCC45C3FB9335 }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: cloud-task-manager-frontend
        package: dist
